name: Release canary

# Daily cross-check that the release pipeline actually released: the max
# version published to npm, the latest v* git tag, and CHANGELOG.md's top
# dated heading must all agree. Two real incidents (a silently no-op'd publish
# loop and a silently degraded changelog promotion) rotted unseen for days —
# this converts that failure mode into a same-day ntfy alert, delivered by the
# "Workflow failure notify" workflow_run listener when this run fails.
#
# All comparison logic lives in ci-truth-serum's `release-canary` console
# script (installed at the rev .pre-commit-config.yaml pins); the wrapper
# script here only wires up the pin and the package name.
on:
  schedule:
    - cron: "17 6 * * *" # daily, offset from the top of the hour
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize canary runs; never cancel — a dropped run is a dropped alert.
  # Static group is intentional and safe: no pull_request trigger, so this
  # never backs a required check that a cancelled run could hang.
  group: release-canary
  cancel-in-progress: false
  # static-concurrency-ok: not a required check (schedule/dispatch only)

jobs:
  canary:
    name: npm / git tag / changelog release agreement
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so every v* tag is present for the tag-side check.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run release canary
        run: bash .github/scripts/release-canary.sh
