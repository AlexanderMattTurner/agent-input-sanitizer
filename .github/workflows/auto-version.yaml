name: Auto version bump and publish

# On every push to the default branch, decide a Conventional-Commits semver bump
# from the commits since the last vX.Y.Z tag and publish the package to npm with
# provenance (OIDC trusted publishing — no NPM_TOKEN). The version is tracked by
# the npm registry and git tags, never committed to package.json. The Claude API
# drafts the CHANGELOG prose and degrades to a plain commit list when it is
# unavailable. See .github/scripts/version-bump.sh for the full logic.
#
# Self-publish guard: version-bump.sh exits early when package.json has
# "private": true, so the template repo never publishes itself. A downstream
# repo opts in by dropping `private` and setting a real, publishable name.
#
# Versioned-app workflow: only adopt this in a repo that is published to npm.
# Repos that are not npm packages (e.g. a website like TurnTrout.com) should
# exclude it via the template-sync EXCLUDE_PATHS list — see
# .github/workflows/template-sync.yaml.

on:
  push:
    branches: [main, master]

concurrency:
  group: auto-version
  cancel-in-progress: false

permissions:
  contents: write
  # Required for npm OIDC trusted publishing (`pnpm publish --provenance`).
  id-token: write

jobs:
  version-and-publish:
    name: Bump version and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # Credentials stay persisted: version-bump.sh pushes the release-docs
        # commit and the vX.Y.Z tag with them. main is protected by a
        # required-status-checks ruleset, and the release-docs commit is
        # `[skip ci]`, so it can never satisfy those checks — the stock
        # GITHUB_TOKEN is not a ruleset bypass actor and its push is rejected with
        # GH013, stranding every release (npm publishes but the docs commit and
        # tag never land, so the next run re-reads the climbing npm version and
        # bumps again). TEMPLATE_SYNC_TOKEN_ORG is the org PAT registered as a
        # ruleset bypass actor; use it, falling back to GITHUB_TOKEN only when it
        # is UNSET (a fork). NOTE: `||` falls back only on an empty value — a
        # token that is SET but unauthorized for this repo is still truthy and
        # will 403, so keep TEMPLATE_SYNC_TOKEN_ORG authorized here (or unset it
        # on a fork to take the GITHUB_TOKEN path).
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          # Need full history so `git describe`/`git log` can find the last tag.
          fetch-depth: 0
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN_ORG || secrets.GITHUB_TOKEN }}

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          # Pin the publish runtime explicitly (npm OIDC trusted publishing needs
          # a recent npm) and point it at the npm registry so provenance works.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Bump version and publish if commits warrant a release
        id: release
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash .github/scripts/version-bump.sh

      # Coupled PyPI release (PRIMARY path). When version-bump.sh actually
      # published a new npm version (released=true), build and publish the
      # matching Python wheel at the SAME version from the SAME commit. These
      # steps no-op on the far-more-common "no release this push" path.
      # publish-python.yaml is the manual break-glass for when a step below
      # fails after npm has already published.
      - name: Bundle the CLI into the Python package
        if: steps.release.outputs.released == 'true'
        run: node scripts/bundle-python-cli.mjs

      - name: Set the wheel version to the released version
        if: steps.release.outputs.released == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: bash scripts/set-pyproject-version.sh "$RELEASE_VERSION"

      - name: Set up uv
        if: steps.release.outputs.released == 'true'
        # No dependency cache: a poisoned cache could tamper with the artifact
        # shipped to PyPI (zizmor cache-poisoning).
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist and wheel
        if: steps.release.outputs.released == 'true'
        run: uv build
        working-directory: python

      - name: Check distribution metadata
        if: steps.release.outputs.released == 'true'
        run: uvx twine check python/dist/*

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        # Pinned to a commit SHA (mutable tags let a compromised maintainer swap
        # code). Trusted Publishing via the workflow's id-token: write — no
        # rotatable secret. Requires a pending publisher for this workflow file
        # on pypi.org (see publish-python.yaml header).
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: python/dist/
