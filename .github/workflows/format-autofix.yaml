name: Format autofix

# Auto-apply Prettier to PR branches and push the fix, so a formatting slip is
# corrected in place instead of just failing the Required "Format check". The
# pushed commit re-triggers format-check (see the token note below), which then
# passes on the fixed commit.
on:
  pull_request:

concurrency:
  group: format-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix:
    # Same-repo PRs only — a token cannot push to a fork's branch — and never on
    # bot-authored PRs: bots (dependabot, etc.) manage their own commits, and
    # claude-code-action rejects bot actors, so autofixing them just burns CI.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # Push the fix with a PAT/App token, NOT GITHUB_TOKEN: a GITHUB_TOKEN
          # push does not re-trigger workflows, so the Required format-check
          # would stay pending on the new commit and block the PR forever.
          # Provide a fine-grained PAT (contents: write) or App token as the
          # `AUTOFIX_TOKEN` secret. If unset, checkout falls back to
          # GITHUB_TOKEN: the fix is still pushed, but you must re-run
          # format-check manually on the new commit.
          token: ${{ secrets.AUTOFIX_TOKEN || github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Apply Prettier and push any fixes
        if: hashFiles('package.json') != ''
        run: bash .github/scripts/format-autofix.sh
