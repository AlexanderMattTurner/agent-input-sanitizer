name: Format autofix

# Auto-apply Prettier to PR branches and push the fix, so a formatting slip is
# corrected in place instead of just failing the Required "Format check". The
# pushed commit re-triggers format-check (see the token note below), which then
# passes on the fixed commit.
on:
  pull_request:

concurrency:
  group: format-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix:
    # Same-repo PRs only — a token cannot push to a fork's branch — and never on
    # bot-authored PRs: bots (dependabot, etc.) manage their own commits, and
    # claude-code-action rejects bot actors, so autofixing them just burns CI.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Autofix is useless without a PAT/App token: a GITHUB_TOKEN push does not
      # re-trigger workflows, so the Required format-check would stay pending on
      # the fixed commit and block the PR. So gate the real work on the secret
      # being present. `secrets` can't be read in a job-level `if`, hence this
      # preflight step that exposes it as a step output; when it's absent every
      # later step is skipped and the job ends green (a no-op), instead of the
      # checkout failing on an empty token.
      - name: Check for AUTOFIX_TOKEN_ORG
        id: guard
        env:
          AUTOFIX_TOKEN_ORG: ${{ secrets.AUTOFIX_TOKEN_ORG }}
        run: |
          if [ -n "$AUTOFIX_TOKEN_ORG" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::AUTOFIX_TOKEN_ORG secret is not set; skipping autofix. Add a fine-grained PAT (contents: write) so the fix-commit re-triggers format-check."
          fi

      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # persist-credentials:false — do NOT leave any push token in .git/config.
          # `pnpm install` (setup-base-env) and `pnpm format` below run PR-defined
          # lifecycle/npm scripts; a persisted org-write PAT would be readable by
          # that attacker-controlled code. The PAT is injected only into the final
          # push step, which runs no PR code.
          persist-credentials: false
          fetch-depth: 0

      - name: Setup base environment
        if: steps.guard.outputs.enabled == 'true'
        uses: ./.github/actions/setup-base-env

      # format + commit run with NO credentials present. `pnpm format` executes the
      # PR's own `format` script, so nothing here may hold the push token.
      - name: Apply Prettier and commit
        id: format
        if: steps.guard.outputs.enabled == 'true' && hashFiles('package.json') != ''
        run: |
          pnpm format
          # `git diff --quiet` exits non-zero exactly when Prettier changed files.
          if git diff --quiet; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
            echo "Already Prettier-clean; nothing to autofix."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # `style:` keeps the commit Conventional-Commits valid (the commit-msg
          # hook runs — postinstall set core.hooksPath).
          git commit -m "style: apply prettier"
          echo "changed=true" >>"$GITHUB_OUTPUT"

      # Push in a dedicated step whose only secret is the PAT. No PR code runs here,
      # so the token cannot be exfiltrated. A PAT (not GITHUB_TOKEN) is required so
      # the pushed commit re-triggers the Required format-check.
      - name: Push Prettier fix
        if: steps.guard.outputs.enabled == 'true' && steps.format.outputs.changed == 'true'
        env:
          AUTOFIX_TOKEN_ORG: ${{ secrets.AUTOFIX_TOKEN_ORG }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git push \
            "https://x-access-token:${AUTOFIX_TOKEN_ORG}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${HEAD_REF}"
