name: Phone Home Improvements

# When a PR is merged that contains a "Lessons Learned" section,
# this workflow opens an issue on the template repository so the
# improvement can be adopted across all downstream projects.

on:
  pull_request:
    types: [closed]

env:
  TEMPLATE_REPO: "alexander-turner/claude-automation-template"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  phone-home:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Extract lessons from PR body
        id: extract
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const run = require('./.github/scripts/phone-home-extract.js')
            await run({github, context, core})

      - name: Scan lessons for leaked secrets
        if: steps.extract.outputs.has_lessons == 'true'
        env:
          GITLEAKS_VERSION: "8.30.1"
          # Published SHA-256 of gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz.
          # Verify before extracting so a tampered release asset can't inject a
          # malicious binary next to the TEMPLATE_SYNC_TOKEN step. MUST match
          # GITLEAKS_VERSION and stay in lockstep with gitleaks.yaml's pin.
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # Download to a file (not a pipe) so the digest is verified before extract.
          curl --proto '=https' -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" \
            -o "$tarball"
          case "$GITLEAKS_SHA256" in
            PLACEHOLDER_*)
              echo "::error::GITLEAKS_SHA256 is still the placeholder. Set the real published SHA-256 for gitleaks ${GITLEAKS_VERSION} before this scan can run." >&2
              exit 1 ;;
          esac
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar xz -C /usr/local/bin -f "$tarball" gitleaks
          gitleaks detect --no-git -s /tmp/phone-home -v

      - name: Submit to template repo
        if: steps.extract.outputs.has_lessons == 'true'
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.extract.outputs.pr_title }}
          PR_URL: ${{ steps.extract.outputs.pr_url }}
          SOURCE_REPO: ${{ steps.extract.outputs.source_repo }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const run = require('./.github/scripts/phone-home-submit.js')
            await run({github, context, core})
